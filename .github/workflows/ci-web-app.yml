name: CI web-app

# Typecheck + unit tests for the web-app dashboard. The existing test.yml runs
# the Expo/mobile suite; this gates web-app/ specifically on every PR and push
# that touches it, before deploy-web-app.yml publishes.

on:
  push:
    branches: [main, develop]
    paths:
      - 'web-app/**'
      - '.github/workflows/ci-web-app.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'web-app/**'
      - '.github/workflows/ci-web-app.yml'

concurrency:
  group: ci-web-app-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web-app/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      # BLOCKING: the hand-mirrored inspection engine must never import the live
      # mobile engine (@root/lib/inspection). This one @root reach hard-fails
      # even though the broad lint stays informational. See CLAUDE.md + the
      # scripts/check-inspection-mirror.mjs header.
      - name: Inspection-mirror guard
        run: npm run lint:inspection-guard

      # Non-blocking until the query-key migration on the page layer lands and
      # the tree can be auto-fixed/formatted. Flip to a required step then.
      - name: Lint (informational)
        run: npm run lint
        continue-on-error: true
