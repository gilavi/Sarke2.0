name: Deploy web

# Builds the static signing app under web/ and pushes the dist output to
# the gh-pages branch. Triggered only when the web app or this workflow
# changes — pushes that touch only the mobile app skip the deploy.

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch: {}

permissions:
  contents: write

# One group PER gh-pages destination. Same-destination pushes serialize (no
# self-race); different destinations run in parallel. Do NOT fold all writers
# into one shared group: GitHub keeps only one running + one pending run per
# group and CANCELS older pending runs, so 3+ deploys coinciding (e.g. a
# workflow-file or lib/** change firing several at once, or concurrent pushes)
# would silently drop sibling deploys. A rare cross-destination push race on the
# gh-pages ref surfaces as a visible, re-runnable failure — the lesser evil.
concurrency:
  group: gh-pages-web
  cancel-in-progress: false

jobs:
  # Gate: a red typecheck blocks the deploy. The signer app has no test suite,
  # so typecheck is the check; the build below also runs `tsc -b`, but a
  # dedicated job surfaces the failure as its own required status.
  checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      - name: Typecheck
        run: npm run typecheck

  build-deploy:
    needs: checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      # Use ci when a lockfile exists; otherwise fall back to install so the
      # first run after scaffolding still succeeds.
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_BASE_PATH: /
        run: npm run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web/dist
          keep_files: true
