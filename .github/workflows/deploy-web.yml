name: Deploy web

# Builds the static signing app under web/ and pushes the dist output to
# the gh-pages branch. Triggered only when the web app or this workflow
# changes — pushes that touch only the mobile app skip the deploy.

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch: {}

permissions:
  contents: write

# Shared with every other gh-pages writer (docs, web-app, cms, staging,
# preview) so pushes to the single gh-pages branch serialize instead of racing
# into non-fast-forward push failures. cancel-in-progress:false = queue, don't
# drop.
concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  # Gate: a red typecheck blocks the deploy. The signer app has no test suite,
  # so typecheck is the check; the build below also runs `tsc -b`, but a
  # dedicated job surfaces the failure as its own required status.
  checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      - name: Typecheck
        run: npm run typecheck

  build-deploy:
    needs: checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      # Use ci when a lockfile exists; otherwise fall back to install so the
      # first run after scaffolding still succeeds.
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_BASE_PATH: /
        run: npm run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web/dist
          keep_files: true
