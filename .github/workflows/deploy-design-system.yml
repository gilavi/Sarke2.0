name: Deploy design system

# Builds the design-system/ Storybook (which renders the real RN primitives via
# react-native-web) and publishes the static export to the SEPARATE repo
# gilavi/hubble-ds (its gh-pages branch), served at https://gilavi.github.io/hubble-ds/
# and — once DNS is added — https://ds.hubble.ge.
#
# Why a separate repo: GitHub Pages allows only one custom domain per repo, and
# this repo's Pages already serves hubble.ge. Keeping the design system in its
# own repo also isolates it from the live dashboard's gh-pages branch.
#
# Cross-repo publish uses the HUBBLE_DS_DEPLOY_KEY secret (an SSH deploy key with
# write access to gilavi/hubble-ds). The deploy step is gated on that secret, so
# the workflow still runs as a BUILD CHECK if the key is ever absent.
#
# Triggers on develop (the design system lives on develop and is NOT merged to
# main per the project's branching choice).

on:
  push:
    branches: [develop]
    paths:
      - 'design-system/**'
      - 'components/primitives/**'
      - 'components/**'
      - 'lib/**'
      - '.github/workflows/deploy-design-system.yml'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: design-system-deploy
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    env:
      HAS_KEY: ${{ secrets.HUBBLE_DS_DEPLOY_KEY != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      # The universal components import react-native / reanimated / svg from the
      # ROOT node_modules (resolved by walking up), so the build needs both
      # installs — this pins the showcase to the exact versions the app ships.
      - name: Install root dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci --legacy-peer-deps --no-audit --no-fund
          else
            npm install --legacy-peer-deps --no-audit --no-fund
          fi

      - name: Install design-system dependencies
        working-directory: design-system
        run: |
          if [ -f package-lock.json ]; then
            npm ci --legacy-peer-deps --no-audit --no-fund
          else
            npm install --legacy-peer-deps --no-audit --no-fund
          fi

      - name: Build Storybook (static)
        working-directory: design-system
        run: npm run build

      - name: Publish to gilavi/hubble-ds (gh-pages)
        if: env.HAS_KEY == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.HUBBLE_DS_DEPLOY_KEY }}
          external_repository: gilavi/hubble-ds
          publish_branch: gh-pages
          publish_dir: ./design-system/dist
          # Add a CNAME file here (cname: ds.hubble.ge) once the DNS record for
          # ds.hubble.ge exists — see docs/DESIGN_SYSTEM_DEPLOY.md. Until then the
          # site is served at https://gilavi.github.io/hubble-ds/.
          enable_jekyll: false

      - name: Note (deploy skipped)
        if: env.HAS_KEY != 'true'
        run: echo "HUBBLE_DS_DEPLOY_KEY not set — built only, skipped deploy. See docs/DESIGN_SYSTEM_DEPLOY.md."
