name: Deploy CMS (text editor)

# Builds the standalone text CMS (cms/) and deploys it to /cms/ on gh-pages, so
# https://hubble.ge/cms/ serves it. keep_files:true preserves the sibling trees
# (/, /app/, /app-staging/, docs). The production base path /cms/ is hard-coded in
# cms/vite.config.ts for `vite build`, so no --base override is needed here.

on:
  push:
    branches: [main]
    paths:
      - 'cms/**'
      - '.github/workflows/deploy-cms.yml'
  workflow_dispatch: {}

permissions:
  contents: write

# Per-destination group (writes /cms/). Same-destination pushes serialize;
# other gh-pages writers run in parallel. NOT one shared group — GitHub cancels
# older pending runs in a group, which would silently drop sibling deploys when
# several coincide. See deploy-web.yml for the full rationale.
concurrency:
  group: gh-pages-cms
  cancel-in-progress: false

jobs:
  # Gate: a red typecheck blocks the deploy. The CMS `build` script is just
  # `vite build` (no tsc), so this job is the ONLY place cms/ is typechecked
  # before it ships. No test suite exists, so typecheck is the check.
  checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cms
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: cms/package-lock.json

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci --legacy-peer-deps
          else
            npm install --legacy-peer-deps --no-audit --no-fund
          fi

      - name: Typecheck
        run: npm run typecheck

  build-deploy:
    needs: checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cms
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: cms/package-lock.json

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci --legacy-peer-deps
          else
            npm install --legacy-peer-deps --no-audit --no-fund
          fi

      - name: Build
        run: npm run build

      - name: Deploy to gh-pages /cms/
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./cms/dist
          destination_dir: cms
          keep_files: true
