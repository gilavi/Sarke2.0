name: Deploy web-app

# Builds the new dashboard webapp under web-app/ and pushes it into the gh-pages
# branch under /app/. The /Sarke2.0/ root is owned by web/ (sarke-sign signing
# app), and is preserved by keep_files: true. Two separate workflows write to
# the same gh-pages branch — peaceiris merges with the existing tree.

on:
  push:
    branches: [main]
    paths:
      - 'web-app/**'
      - 'lib/**'
      - 'types/**'
      - '.github/workflows/deploy-web-app.yml'
  workflow_dispatch: {}

permissions:
  contents: write

# Shared with every other gh-pages writer (web, docs, cms, staging, preview) so
# pushes to the single gh-pages branch serialize instead of racing into
# non-fast-forward push failures. cancel-in-progress:false = queue, don't drop.
concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web-app/package-lock.json

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci --legacy-peer-deps
          else
            npm install --legacy-peer-deps --no-audit --no-fund
          fi

      # Guard 1: catch any .ts/.tsx files that are present on disk but not
      # tracked by git (i.e. a developer forgot to `git add` a new component).
      # On a clean GitHub Actions checkout the working tree has no untracked
      # files unless something went wrong, so this is a reliable signal.
      - name: Check for untracked source files
        run: |
          UNTRACKED=$(git ls-files --others --exclude-standard -- 'src/*.ts' 'src/*.tsx' 'src/**/*.ts' 'src/**/*.tsx')
          if [ -n "$UNTRACKED" ]; then
            echo "ERROR: Untracked TypeScript source files found:"
            echo "$UNTRACKED"
            echo "These files are imported by the app but were never committed."
            echo "Run 'git add <file>' and push again."
            exit 1
          fi

      # Guard 0: never deploy a build that doesn't typecheck or pass unit tests.
      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      # Guard 0b: the inspection engine is hand-mirrored from the mobile app; a
      # direct @root/lib/inspection import would silently desync web ↔ mobile.
      # Blocks the deploy. See scripts/check-inspection-mirror.mjs.
      - name: Inspection-mirror guard
        run: npm run lint:inspection-guard

      - name: Build
        env:
          # Defaults match app.json — anon key is public-safe, but secrets win
          # if defined on the repo so we can override per-environment later.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://seskuthiopywrgntsgfw.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'sb_publishable_OF_L2E27-Uv8MMw87fWfSA_znD7moYY' }}
        run: npm run build

      # Guard 2: serve the built dist and verify the app mounts without
      # uncaught JS errors. Catches runtime crashes (wrong library version,
      # bad chunk ordering, etc.) before they reach production.
      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Smoke test — verify app loads without JS errors
        run: npx playwright test --config=playwright.smoke.config.ts

      - name: Deploy to gh-pages /app/
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web-app/dist
          destination_dir: app
          keep_files: true
