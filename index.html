    <script>
      // Redirect to dashboard when no valid signing hash is present.
      // Runs before React loads so there is no blank-page flash.
      (function () {
        var h = window.location.hash;
        var valid =
          /^#\/sign\/[A-Za-z0-9_-]{8,}$/.test(h) ||
          h === '#/success' ||
          h === '#/declined' ||
          h === '#/safety';
        if (!valid) window.location.replace('/app/');
      })();
    </script>
