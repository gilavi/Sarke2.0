name: Sarke2
options:
  bundleIdPrefix: ge.sarke
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: ka

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"     # iPhone only for MVP
    ENABLE_USER_SCRIPT_SANDBOXING: NO

configFiles:
  Debug: Config/Secrets.xcconfig
  Release: Config/Secrets.xcconfig

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.13.0"
  TPPDF:
    url: https://github.com/techprimate/TPPDF
    from: "2.6.0"

targets:
  Sarke2:
    type: application
    platform: iOS
    sources:
      - path: Sarke2
        excludes:
          - "Resources/ka.lproj/**"
    resources:
      - path: Sarke2/Resources/Assets.xcassets
        optional: true
      - path: Sarke2/Resources/Fonts
        optional: true
      - path: Sarke2/Resources/ka.lproj
        optional: true
    dependencies:
      - package: Supabase
        product: Supabase
      - package: TPPDF
        product: TPPDF
    info:
      path: Sarke2/Info.plist
      properties:
        CFBundleDisplayName: Sarke
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: "კამერა გამოიყენება ხარაჩოს და ქამრების ფოტოების ატვირთვისთვის."
        NSPhotoLibraryUsageDescription: "ფოტოების არჩევა სისტემის ბიბლიოთეკიდან."
        CFBundleLocalizations:
          - ka
        UIAppFonts:
          - NotoSansGeorgian-Regular.ttf
          - NotoSansGeorgian-Bold.ttf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ge.sarke.app
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: "Sarke"
