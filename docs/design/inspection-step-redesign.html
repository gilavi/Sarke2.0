<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Inspection step — redesign mockup</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/dist/tabler-icons.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@400;500;700&display=swap');
*{box-sizing:border-box}
body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#E7E8EA;padding:32px 16px;--font-sans:'Inter',system-ui,-apple-system,sans-serif;font-family:'Noto Sans Georgian',var(--font-sans)}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0}
.choice{transition:background .15s,color .15s,border-color .15s}
.noteArea{width:100%;box-sizing:border-box;border:1.5px dashed #CBD0D6;border-radius:14px;background:#FCFCFD;padding:13px 16px;font-family:inherit;font-size:15px;color:var(--ink);min-height:50px;resize:none;line-height:1.4;transition:border-color .15s,background .15s,min-height .18s}
.noteArea::placeholder{color:#9AA0A7}
.noteArea:focus{outline:none;border:1.5px solid var(--ink);background:#fff;min-height:96px}
</style>
</head>
<body>

<div style="width:396px;padding:11px;background:#111317;border-radius:46px;">
  <div style="width:374px;height:744px;background:#fff;border-radius:36px;overflow:hidden;display:flex;flex-direction:column;position:relative;font-family:'Noto Sans Georgian',var(--font-sans),system-ui,-apple-system,sans-serif;--brand:#EF6B3E;--ink:#1A1D21;--muted:#8A9199;--line:#ECEEF1;--line2:#E5E8EC;--chip:#F2F3F5;">

    <div style="height:52px;padding:0 26px;display:flex;align-items:center;justify-content:space-between;position:relative;">
      <span style="font-size:14px;font-weight:500;color:var(--ink);">9:41</span>
      <div style="position:absolute;top:11px;left:50%;transform:translateX(-50%);width:100px;height:26px;background:#111317;border-radius:16px;"></div>
      <div style="display:flex;align-items:center;gap:6px;font-size:16px;color:var(--ink);">
        <i class="ti ti-antenna-bars-4" aria-hidden="true"></i>
        <i class="ti ti-wifi" aria-hidden="true"></i>
        <i class="ti ti-battery-3" aria-hidden="true"></i>
      </div>
    </div>

    <div style="padding:4px 12px 2px;display:flex;align-items:center;justify-content:space-between;">
      <button type="button" aria-label="უკან" style="width:40px;height:40px;border-radius:50%;border:none;background:var(--chip);display:flex;align-items:center;justify-content:center;cursor:pointer;">
        <i class="ti ti-chevron-left" style="font-size:24px;color:var(--ink);" aria-hidden="true"></i>
      </button>
      <div style="display:flex;flex-direction:column;align-items:center;gap:1px;">
        <span style="font-size:16px;font-weight:500;color:var(--ink);">ფასადის ხარაჩო</span>
        <span style="font-size:12.5px;color:var(--muted);">Kheladze testing</span>
      </div>
      <button type="button" aria-label="დახურვა" style="width:40px;height:40px;border-radius:50%;border:none;background:var(--chip);display:flex;align-items:center;justify-content:center;cursor:pointer;">
        <i class="ti ti-x" style="font-size:20px;color:#6B7280;" aria-hidden="true"></i>
      </button>
    </div>

    <div style="padding:8px 20px 10px;display:flex;align-items:center;gap:12px;">
      <div style="flex:1;height:6px;border-radius:999px;background:var(--line);overflow:hidden;">
        <div style="width:39%;height:100%;border-radius:999px;background:var(--brand);"></div>
      </div>
      <span style="font-size:12.5px;font-weight:500;color:var(--muted);white-space:nowrap;">7 / 18</span>
    </div>

    <div style="flex:1;padding:6px 20px 0;overflow-y:auto;display:flex;flex-direction:column;">
      <div style="margin-top:4px;min-height:150px;background:#FBEAE3;border-radius:22px;display:flex;align-items:center;justify-content:center;">
        <svg width="140" height="140" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="24" y="22" width="62" height="80" rx="9" fill="#fff" stroke="var(--brand)" stroke-width="3.2"/>
          <circle cx="34" cy="33" r="4.6" fill="#F2C7B5"/>
          <rect x="43" y="30" width="20" height="4" rx="2" fill="#D9DEE3"/>
          <rect x="43" y="37.5" width="13" height="3" rx="1.5" fill="#E7EBEF"/>
          <rect x="32" y="46" width="23" height="30" rx="4" fill="#EDF0F3"/>
          <circle cx="43.5" cy="57" r="4.8" fill="#C4CCD3"/>
          <path d="M35 76 C35 68.5 38.7 65.5 43.5 65.5 C48.3 65.5 52 68.5 52 76 Z" fill="#C4CCD3"/>
          <rect x="61" y="50" width="22" height="4" rx="2" fill="#E3E7EB"/>
          <rect x="61" y="59" width="22" height="4" rx="2" fill="#E9EDF1"/>
          <rect x="61" y="68" width="14" height="4" rx="2" fill="#EDF0F3"/>
          <line x1="31" y1="86" x2="74" y2="86" stroke="#D7DCE1" stroke-width="4" stroke-dasharray="4 2.6" stroke-linecap="round"/>
          <line x1="31" y1="93" x2="64" y2="93" stroke="#E2E6EA" stroke-width="4" stroke-dasharray="4 2.6" stroke-linecap="round"/>
          <rect x="62" y="17" width="30" height="15" rx="7.5" fill="var(--ink)"/>
          <text x="77" y="27.4" text-anchor="middle" font-size="10" font-weight="700" fill="#fff" font-family="'Noto Sans Georgian',var(--font-sans),sans-serif">A→ა</text>
          <circle cx="86" cy="92" r="15" fill="var(--brand)"/>
          <path d="M79 92 l4.4 4.4 L93.5 84" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>

      <p style="margin:18px 4px 0;font-size:20px;line-height:1.4;font-weight:500;color:var(--ink);text-align:center;">გაარჩია თუ არა ხარაჩოს ვადიანი, ქართულად ნათარგმნი სერტიფიკატი?</p>

      <div style="margin-top:16px;display:flex;flex-direction:column;gap:10px;">
        <div id="photoMount"></div>
        <div id="noteMount"></div>
      </div>
      <div style="height:14px;"></div>
    </div>

    <div style="padding:14px 20px 22px;border-top:.5px solid var(--line);background:#fff;">
      <div id="choiceMount"></div>
      <button type="button" id="nextBtn" disabled style="margin-top:14px;width:100%;height:54px;border:none;border-radius:16px;font-family:inherit;font-size:17px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:8px;background:#EAECEF;color:#B3B8BF;cursor:not-allowed;">შემდეგი<i class="ti ti-arrow-right" style="font-size:20px;" aria-hidden="true"></i></button>
    </div>

  </div>
</div>

<script>
(function(){
  var state={val:null,photos:0,noteOpen:false,noteValue:''};
  var mount=document.getElementById('choiceMount');
  var photoMount=document.getElementById('photoMount');
  var noteMount=document.getElementById('noteMount');
  var next=document.getElementById('nextBtn');

  var barHTML=function(id,label,icon){
    return '<button type="button" id="'+id+'" style="width:100%;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 16px;border:1.5px dashed #CBD0D6;border-radius:14px;background:#FCFCFD;font-family:inherit;cursor:pointer;"><span style="display:inline-flex;align-items:center;gap:11px;font-size:15px;font-weight:500;color:#4F555C;"><i class="ti '+icon+'" style="font-size:20px;color:#8A9199;" aria-hidden="true"></i>'+label+'</span><i class="ti ti-plus" style="font-size:20px;color:#9AA0A7;" aria-hidden="true"></i></button>';
  };

  function choiceMarkup(){
    var sel=state.val;
    var b=function(val,label,icon){
      var on=sel===val;
      var st='flex:1;height:56px;border:1.5px solid '+(on?'var(--ink)':'var(--line2)')+';border-radius:14px;background:'+(on?'#F6F7F9':'#fff')+';display:flex;align-items:center;justify-content:center;gap:9px;font-family:inherit;font-size:16px;font-weight:500;color:'+(on?'var(--ink)':'#6B7280')+';cursor:pointer;';
      return '<button type="button" class="choice" data-val="'+val+'" style="'+st+'"><i class="ti '+icon+'" style="font-size:20px;color:'+(on?'var(--ink)':'#9AA0A7')+'" aria-hidden="true"></i>'+label+'</button>';
    };
    return '<div style="display:flex;gap:12px;">'+b('yes','კი','ti-check')+b('no','არა','ti-x')+'</div>';
  }
  function bindChoices(){
    var els=mount.querySelectorAll('.choice');
    for(var i=0;i<els.length;i++){ els[i].addEventListener('click',function(){ state.val=this.getAttribute('data-val'); renderChoice(); updateNext(); }); }
  }
  function renderChoice(){ mount.innerHTML=choiceMarkup(); bindChoices(); }

  function photoMarkup(){
    var n=state.photos, thumbs='';
    if(n>0){
      var items='';
      for(var i=0;i<n;i++){
        items+='<div style="position:relative;width:58px;height:58px;border-radius:10px;background:#EAEEF2;display:flex;align-items:center;justify-content:center;"><i class="ti ti-photo" style="font-size:22px;color:#9AA7B0;" aria-hidden="true"></i><button type="button" class="thumbDel" aria-label="წაშლა" style="position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;border:2px solid #fff;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0;"><i class="ti ti-x" style="font-size:12px;" aria-hidden="true"></i></button></div>';
      }
      thumbs='<div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;">'+items+'</div>';
    }
    return barHTML('photoAdd','ფოტო','ti-camera')+thumbs;
  }
  function bindPhoto(){
    var add=document.getElementById('photoAdd');
    if(add) add.addEventListener('click',function(){ state.photos++; renderPhoto(); });
    var dels=photoMount.querySelectorAll('.thumbDel');
    for(var i=0;i<dels.length;i++){ dels[i].addEventListener('click',function(){ state.photos=Math.max(0,state.photos-1); renderPhoto(); }); }
  }
  function renderPhoto(){ photoMount.innerHTML=photoMarkup(); bindPhoto(); }

  function noteMarkup(){
    if(!state.noteOpen) return barHTML('noteAdd','შენიშვნა','ti-pencil');
    return '<textarea id="noteArea" class="noteArea" rows="1" placeholder="შენიშვნა…"></textarea>';
  }
  function bindNote(justOpened){
    var add=document.getElementById('noteAdd');
    if(add) add.addEventListener('click',function(){ state.noteOpen=true; renderNote(true); });
    var ta=document.getElementById('noteArea');
    if(ta){
      ta.value=state.noteValue;
      ta.addEventListener('input',function(){ state.noteValue=this.value; });
      ta.addEventListener('blur',function(){ if(this.value.trim()===''){ state.noteValue=''; state.noteOpen=false; renderNote(false); } });
      if(justOpened){ ta.focus(); var l=ta.value.length; try{ ta.setSelectionRange(l,l); }catch(e){} }
    }
  }
  function renderNote(justOpened){ noteMount.innerHTML=noteMarkup(); bindNote(justOpened); }

  function updateNext(){
    if(state.val){ next.disabled=false; next.style.background='var(--brand)'; next.style.color='#fff'; next.style.cursor='pointer'; }
    else { next.disabled=true; next.style.background='#EAECEF'; next.style.color='#B3B8BF'; next.style.cursor='not-allowed'; }
  }

  renderChoice();
  renderPhoto();
  renderNote(false);
  updateNext();
})();
</script>

</body>
</html>
